name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('pyproject.toml') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Test
        run: python -m pytest tests/ -q --tb=short --cov=pareto_tournament --cov-report=term-missing --cov-fail-under=75

      - name: Type check
        run: python -m mypy pareto_tournament/ --ignore-missing-imports --warn-unreachable || true

      - name: Lint
        run: python -m ruff check pareto_tournament/ tests/ || true
